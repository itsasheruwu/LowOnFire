name: LowOnFire
version: ${version}
main: dev.ash.lowonfire.LowOnFirePlugin
api-version: "1.21"
softdepend: [Geyser-Spigot, floodgate]
commands:
  lowonfire:
    description: Reload LowOnFire or resend its resource pack.
    usage: "/lowonfire <reload|apply|status|debug|probe|on|off|toggle> [player]"
  requestlowfire:
    description: Opt in to LowOnFire (Java or Bedrock).
    usage: "/requestlowfire [off]"
permissions:
  lowonfire.command:
    default: op
  lowonfire.apply:
    default: true
  lowonfire.toggle:
    default: true
  lowonfire.request:
    default: true
